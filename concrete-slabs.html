<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concrete Slabs | SlabWay</title>

    <meta name="description"
        content="Start a concrete slab request through SlabWay and compare local provider options for garage slabs, shed bases, utility pads, workshop surfaces, and concrete slab projects.">
    <meta name="theme-color" content="#151716">

    <link rel="icon" href="assets/images/logo.svg" type="image/svg+xml">

    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/services.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>

<body class="service-page" data-service="concrete-slabs">
    <a class="skip-link" href="#main">Skip to content</a>

    <div data-site-header></div>
    <div data-mobile-menu></div>
    <div data-section-rail></div>

    <main id="main">
        <!-- =========================================================
             Section 1 — Shared Service Hero
             Rendered from config by assets/js/services.js
             ========================================================= -->
        <div data-service-hero></div>

        <!-- =========================================================
             Section 2 — Black Icon-Only Concrete Strip
             ========================================================= -->
        <section class="service-icon-strip" id="icons" aria-label="Concrete service navigation">
            <div class="container-wide" data-service-icons>
                <!-- Rendered by assets/js/services.js -->
            </div>
        </section>

        <!-- =========================================================
             Section 3 — Service Overview Split
             ========================================================= -->
        <section class="service-overview section section--light" id="overview" aria-labelledby="service-overview-title">
            <span class="service-crack-mark service-crack-mark--left" aria-hidden="true"></span>

            <div class="container" data-service-overview>
                <!-- Rendered by assets/js/services.js -->
            </div>

            <span class="service-dust-line" aria-hidden="true"></span>
        </section>

        <!-- =========================================================
             Section 4 — Types Of Slab Projects
             ========================================================= -->
        <section class="service-types section section--soft" id="types" aria-labelledby="service-types-title">
            <div class="container-wide">
                <div class="service-section-head" data-aos="fade-up">
                    <p class="section-kicker">
                        PROJECT PATHS
                    </p>

                    <h2 id="service-types-title">
                        Common Concrete Slab Request Types
                    </h2>

                    <p>
                        Review common slab-related project paths before starting a clearer request and comparing
                        local concrete provider options through SlabWay.
                    </p>
                </div>

                <div style="margin-top: 42px;" data-service-types>
                    <!-- Rendered by assets/js/services.js -->
                </div>
            </div>
        </section>

        <!-- =========================================================
             Section 5 — Aggregator Reminder Quote
             ========================================================= -->
        <section class="service-reminder" id="reminder" aria-label="SlabWay platform reminder">
            <div class="container" data-service-reminder>
                <!-- Rendered by assets/js/services.js -->
            </div>
        </section>

        <!-- =========================================================
             Section 6 — Global CTA
             ========================================================= -->
        <div id="request" data-global-cta></div>
    </main>

    <div data-site-footer></div>
    <div data-cookie-banner></div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/services.js"></script>
</body>

</html>
